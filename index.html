<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Long Drive - HTML5 Canvas Prototype</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      image-rendering: auto;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script src="javascript.js"></script>
</body>
</html>
